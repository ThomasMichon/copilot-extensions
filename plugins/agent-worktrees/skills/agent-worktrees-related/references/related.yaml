# <repo>/.agent-worktrees/related.yaml -- per-project related repos (reference example)
#
# Canonical, copy-pasteable example. A committed, in-repo file recording -- from
# THIS repo's point of view -- the other repos relevant to it, and where to work
# on them. Keys are names in the global repos.yaml registry. Field docs: the
# agent-worktrees-related SKILL.md. Managed by `agent-worktrees related ...`.

primary: example-web                 # the default/primary related repo
related:
  example-web:
    role: product                 # product|dependency|consumer|tooling|docs|sibling
    summary: "Primary product monorepo we ship changes to."
    doc: related/example-web.md      # narrative, relative to .agent-worktrees/
    locus:
      preferred: codespace        # local | machine:<key> | codespace | container
      machines: [dev6]            # boxes the repo is available on (optional)
      # CodeSpace venue -- cloud, usable from ANY machine.
      codespace: { repo: org/example-web-codespaces,
                   machine: largePremiumLinux256gb, location: EastUs,
                   workspace_folder: /workspaces/example-web }
      # Container venue -- a local Docker dev-container fleet, scoped to the
      # boxes that host it (`machines` restricts where it can run).
      container: { repo: org/example-web-codespaces,
                   workspace_folder: /workspaces/example-web,
                   machines: [dev6] }
    delegate: { via: agent-codespaces }   # agent-bridge | agent-codespaces | agent-containers | none
  copilot-extensions:
    role: tooling
    summary: "Source of the plugins this control plane drives."
    doc: related/copilot-extensions.md
    locus: { preferred: machine:dev6, machines: [dev6, cloud1] }
    delegate: { via: agent-bridge }
