# Worktree Manager — tmux configuration
# Deployed by agent-worktrees installer.  Drift detection overwrites
# this file when the repo version changes.  Edit the repo source instead.
#
# Philosophy: opt-in intercept.  All keystrokes and mouse events pass
# straight through to the inner application unless the prefix key (Ctrl+B)
# is pressed first.  This keeps Copilot CLI, editors, and TUI apps in
# full control of the terminal.

# ── Terminal behaviour ────────────────────────────────────────────────
# escape-time 0: deliver escape sequences immediately instead of waiting
# 500ms.  Without this, arrow keys and special keys lag badly in TUI apps
# like Copilot CLI.
set -sg escape-time 0

# remain-on-exit failed: if the inner command crashes (non-zero exit), keep
# the pane visible so the error message can be read.  Normal exits (0) close
# the pane as usual.
set -g remain-on-exit failed

# focus-events: pass terminal focus in/out events to applications.
set -g focus-events on

# ── Prefix ────────────────────────────────────────────────────────────
set -g prefix C-b

# ── Mouse: relay wheel events, don't steal clicks ───────────────────
# mouse on = tmux intercepts mouse events and relays wheel to the pane.
# Hold Shift+click/drag for terminal-native text selection.
set -g mouse on

# ── Remove all unprefixed (root-table) key bindings ──────────────────
# PageUp, PageDown, arrow keys, function keys — everything goes to the
# inner app unless Ctrl+B is pressed first.
unbind-key -a -T root

# ── Re-add mouse wheel passthrough (cleared by unbind above) ─────────
# send-keys -M relays the mouse event directly to the inner application.
bind-key -T root WheelUpPane   send-keys -M
bind-key -T root WheelDownPane send-keys -M

# ── Prefix bindings (Ctrl+B, then ...) ───────────────────────────────
bind-key d   detach-client
bind-key c   new-window
bind-key n   next-window
bind-key p   previous-window
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key %   split-window -h -c "#{pane_current_path}"
bind-key [   copy-mode
bind-key ]   paste-buffer
bind-key :   command-prompt
bind-key ?   list-keys
bind-key s   choose-session

# ── Status bar: worktree git disposition ─────────────────────────────
# Poll the worktree's git state relative to its upstream default branch
# and render it as a colored block on the right, prefixed with the
# session title.  The #() job runs in the pane's current directory, so
# `status-segment` classifies the worktree the pane is actually in.
#   DIRTY (red)  uncommitted changes or commits ahead of upstream
#   FINAL (green) clean, work landed / fast-forwardable to upstream
#   UNUSED (grey) clean, no work since the fork point
#   WIP (amber)  clean, ahead with content not yet upstream
# status-interval is the poll cadence (seconds).
set -g status-interval 15
set -g status-right-length 150
set -g status-right '#(agent-worktrees status-segment) %H:%M '
