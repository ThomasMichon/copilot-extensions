# codespaces.yaml -- agent-codespaces configuration (reference example)
#
# Canonical, copy-pasteable example. Copy into your repo root and adapt.
# All org/account/URL values live HERE, in your own repo -- never hardcoded
# in the copilot-extensions plugin. Field-by-field docs: the codespaces-setup
# SKILL.md "Config Reference" section.

defaults:
  machine_type: largePremiumLinux        # default `gh codespace create` VM size
  location: EastUs                        # default Azure region
  ssh_user: vscode                        # SSH user (match your CodeSpace user)
  # Fallback devcontainer config used ONLY when a repo has multiple discoverable
  # devcontainer.json files (otherwise `gh codespace create` prompts and fails
  # headless). Single-devcontainer repos are unaffected. Override per-repo below.
  # devcontainer_path: .devcontainer/devcontainer.json
  # Your ACCOUNT-WIDE dotfiles repo -- the single repo GitHub clones into every
  # CodeSpace (set at github.com/settings/codespaces; no API to read it, so
  # declare it once here). Should host an install.sh; run by connect-time
  # housekeeping after sync. Not per-repo.
  # dotfiles_repo: <your-user>/dotfiles
  #
  # Global workspace root applied to EVERY CodeSpace. Prefer the per-repo
  # `repos.<repo>.workspace_repo` / `workspace_folder` below when you adopt
  # more than one CodeSpaces repo -- a CodeSpaces repo's name is often NOT the
  # checkout path (e.g. a `*-codespaces` repo whose checkout is /workspaces/<app>).
  # workspace_folder: /workspaces/<your-repo>

credentials:
  relay_port: 9857                        # TCP port for the credential relay
  # Default Azure DevOps host for bare `get-access-token` requests that carry
  # no host (npm/nuget via ado-auth-helper). Unset = such requests are rejected.
  # ado_host: <your-org>.visualstudio.com
  sources:
    git-credential:
      enabled: true
      allowed_hosts:
        - "github.com"
        - "*.github.com"
        - "dev.azure.com"
        - "*.visualstudio.com"
    gh-auth:
      enabled: true
      allowed_hosts:
        - "github.com"
    # az-login:                           # Azure token relay (DISABLED by default)
    #   enabled: false
    #   allowed_resources:
    #     - "https://management.azure.com/"

# Per-target-repo overrides. Keys are the CodeSpaces repository (owner/name).
repos:
  <your-org>/<your-repo>-codespaces:
    machine_type: largePremiumLinux256gb
    location: EastUs
    # This CodeSpaces repo hosts the <your-repo> product checkout. Recording the
    # directional "consume-from" link (mirrors agent-worktrees' related repos)
    # makes agents launched for this CodeSpace land in /workspaces/<your-repo>
    # rather than the (wrong) /workspaces/<your-repo>-codespaces.
    workspace_repo: <your-repo>           # -> workspace_folder = /workspaces/<your-repo>
    # workspace_folder: /workspaces/<checkout>   # explicit override if the
    #                                            # checkout isn't /workspaces/<basename>
    # Which devcontainer to build from when this repo ships more than one (e.g. a
    # local-Docker config alongside the CodeSpaces one). agent-codespaces only
    # passes --devcontainer-path when the repo actually has multiple configs, so
    # this keeps headless `create` non-interactive without affecting other repos.
    # An agent can still override per-create: `agent-codespaces create --devcontainer-path ...`.
    # devcontainer_path: .devcontainer/devcontainer.json
    # Repo-specific provisioning -- deployed into the CodeSpace by
    # agent-codespaces on SSH connect (by-convention hook).
    # provision:
    #   files:
    #     - src: path/in/your/repo/hook.sh
    #       dest: ~/.bashrc.d/hook.sh
    #   on_connect:
    #     - "grep -qF hook.sh ~/.bashrc || echo '. ~/.bashrc.d/hook.sh' >> ~/.bashrc"
